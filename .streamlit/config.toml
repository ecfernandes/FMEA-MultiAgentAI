[theme]
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"


[runner]
# Improve performance and remove unnecessary animations
fastReruns = true


[client]
# Minimal and professional interface
showErrorDetails = true
toolbarMode = "minimal"

[server]
headless = true
enableXsrfProtection = true
